<!DOCTYPE html>
<html>

<head>
    <title>AI Motion Analysis</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>AI Motion Analysis Platform</h1>
        <p>Upload a video or image. Get instant feedback on performance and injury risk.</p>

        <div class="card">

            <select id="mode">
                <option value="sprint">Sprint Analysis</option>
                <option value="tennis">Tennis Analysis</option>
                <option value="health">Health Analysis</option>
            </select>

            <input type="file" id="fileInput" accept="video/*,image/*">

            <button onclick="analyze()">Analyze</button>

        </div>

        <div class="results">
            <h2>Natural Language Feedback</h2>
            <div id="nlOutput"></div>

            <h2>Raw Data</h2>
            <pre id="jsonOutput"></pre>
        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
